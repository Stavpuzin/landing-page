<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>המסע אל עצמך</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #fff8e7; /* רקע שמנת */
      color: #888888; /* טקסט אפור בהיר */
    }

    header {
      background-color: #f5e6d3; /* שמנת כהה */
      padding: 30px 20px;
      text-align: center;
      border-bottom: 2px solid #e0d1b8;
    }

    header h1 {
      margin: 0;
      font-size: 2.5em;
      color: #6b7bbf; /* כחול עדין */
    }

    .content {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      text-align: center;
    }

    .content p {
      font-size: 1.2em;
      line-height: 1.6;
      color: #888888;
    }

    .book-image {
      margin: 30px 0;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      max-width: 100%;
      height: auto;
    }

    /* כפתור רכישה PayPal */
    .paypal-button {
      display: inline-block;
      margin-top: 20px;
    }

    .button-custom {
      display: inline-block;
      padding: 15px 30px;
      font-size: 1.2em;
      background: linear-gradient(135deg, #ffb6c1, #add8e6); /* ורוד וכחול עדין */
      color: #fff;
      text-decoration: none;
      border-radius: 12px;
      transition: 0.3s;
      border: none;
      font-weight: bold;
      box-shadow: 0 5px 10px rgba(0,0,0,0.1);
    }

    .button-custom:hover {
      background: linear-gradient(135deg, #ff9fb3, #90c1e0);
      transform: translateY(-2px);
    }

    footer {
      text-align: center;
      padding: 20px;
      background-color: #f5e6d3;
      margin-top: 50px;
      font-size: 0.9em;
      color: #888888;
      border-top: 2px solid #e0d1b8;
    }
  </style>
</head>
<body>

  <header>
    <h1>המסע אל עצמך</h1>
  </header>

  <div class="content">
    <p>ספר דיגיטלי ייחודי שיעזור לכם להכיר את עצמכם, לצמוח ולגלות דרכים חדשות להתפתחות אישית. עכשיו במחיר השקה מיוחד!</p>
    
    <!-- כאן תשימי את תמונת הכריכה האמיתית שלך -->
    <img src="https://via.placeholder.com/400x600" alt="כריכת הספר המסע אל עצמך" class="book-image">

    <!-- כפתור רכישה מוכן PayPal -->
    <div class="paypal-button">
      <form action="https://www.paypal.com/donate" method="post" target="_top">
        <!-- הכנסי כאן את ה-Business ID או את ה-Link שלך מ-PayPal -->
        <input type="hidden" name="hosted_button_id" value="YOUR_BUTTON_ID_HERE" />
        <input type="submit" class="button-custom" value="לרכישת הספר" />
      </form>
    </div>
  </div>

  <footer>
    © 2026 המסע אל עצמך | כל הזכויות שמורות
  </footer>

</body>
</html>

  <!-- PayPal Button Container -->
  <div id="paypal-container"></div>
</div>

<!-- PayPal SDK -->
<script src="https://www.paypal.com/sdk/js?client-id=YOUR_CLIENT_ID&currency=ILS"></script>
<script>
  paypal.Buttons({
    createOrder: function(data, actions) {
      return actions.order.create({
        purchase_units: [{
          amount: { value: '50.00' } // מחיר הספר
        }]
      });
    },
    onApprove: function(data, actions) {
      return actions.order.capture().then(function(details) {
        alert('תודה על הרכישה, ' + details.payer.name.given_name + '!');
        // הפניה לקובץ PDF להורדה אחרי התשלום
        window.location.href = 'yourbook.pdf';
      });
    }
  }).render('#paypal-container');
</script>

</body>
</html>
<script 
  src="https://www.paypal.com/sdk/js?client-id=BAACWrOZGBoLDlPBXPGGah4srdcZqNI2VoSQtQs9DrRk-S1ifsfeNGGApOqMRaiXABp7mFamWVbGNc_4lw&components=hosted-buttons&disable-funding=venmo&currency=ILS">
</script>

    hostedButtonId: "5BSLU7DFQQZ32",
  }).render("#paypal-container-5BSLU7DFQQZ32")
</script>

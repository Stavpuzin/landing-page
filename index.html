<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <title>דף נחיתה שלי</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to right, #667eea, #764ba2);
      color: white;
      text-align: center;
    }
    .container {
      margin-top: 150px;
    }
    h1 {
      font-size: 48px;
    }
    p {
      font-size: 20px;
    }
    button {
      margin-top: 20px;
      padding: 15px 30px;
      font-size: 18px;
      background: white;
      color: #333;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background: #ddd;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ברוכים הבאים 🚀</h1>
    <p>האתר הראשון שלי נראה כבר מקצועי!</p>
    <button onclick="alert('ניצור איתך קשר!')">צור קשר</button>
  </div>
</body>
</html>
